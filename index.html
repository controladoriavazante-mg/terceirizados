    let currentData = [...data];
    let sortDirection = true;
    let editIndex = -1; // -1 para adicionar, >=0 para editar
 
    function renderTable(items) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        const isAdmin = document.body.classList.contains("edit-mode");

        items.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${item.Ano || ''}</td>
                <td>${item.Empresa || ''}</td>
                <td>${item.Função || ''}</td>
                <td><strong>${item.Nome || ''}</strong></td>
                <td>${item.Local || ''}</td>
                <td class="edit-mode-buttons" style="display: ${isAdmin ? 'table-cell' : 'none'}">
                    <button class="btn btn-sm btn-warning me-1" onclick="editRecord(${index})"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteRecord(${index})"><i class="bi bi-trash"></i></button>
                </td>
            `;
            tbody.appendChild(row);
        });
        
        document.getElementById("recordCount").textContent = `${items.length} registro(s) encontrado(s)`;
    }

    function filterData() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filtered = data.filter(item => {
            const nome = (item.Nome || '').toString().toLowerCase();
            const empresa = (item.Empresa || '').toString().toLowerCase();
            const ano = (item.Ano || '').toString().toLowerCase();
            
            return nome.includes(searchTerm) || empresa.includes(searchTerm) || ano.includes(searchTerm);
        });
        currentData = filtered;
        renderTable(filtered);
    }

    function sortTable(columnIndex) {
        const keys = ['Ano', 'Empresa', 'Função', 'Nome', 'Local'];
        const key = keys[columnIndex];
        
        sortDirection = !sortDirection;
        
        currentData.sort((a, b) => {
            let valA = a[key] ? a[key].toString().toLowerCase() : '';
            let valB = b[key] ? b[key].toString().toLowerCase() : '';
            
            if (key === 'Ano') {
                valA = parseInt(valA) || 0;
                valB = parseInt(valB) || 0;
            }

            if (valA < valB) return sortDirection ? -1 : 1;
            if (valA > valB) return sortDirection ? 1 : -1;
            return 0;
        });
        
        renderTable(currentData);
        
        const icons = document.querySelectorAll('.sort-icon');
        icons.forEach((icon, idx) => {
            if (idx === columnIndex) {
                icon.className = sortDirection ? 'bi bi-arrow-up sort-icon' : 'bi bi-arrow-down sort-icon';
            } else {
                icon.className = 'bi bi-arrow-down-up sort-icon';
            }
        });
    }

    // Funções de Administração
    function toggleAdminMode(enable) {
        const adminElements = document.querySelectorAll('.edit-mode-buttons');
        const publicViewElements = document.querySelectorAll('.view-mode-only');
        const adminPanel = document.getElementById('adminPanel');
        const adminLoginForm = document.getElementById('adminLoginForm');
        const publicViewContent = document.getElementById('publicViewContent');

        if (enable) {
            document.body.classList.add('edit-mode');
            adminElements.forEach(el => el.style.display = 'inline-block');
            publicViewElements.forEach(el => el.style.display = 'none');
            adminPanel.style.display = 'block';
            adminLoginForm.style.display = 'none';
            publicViewContent.style.display = 'block'; // Manter a busca visível
            document.querySelector('th:last-child').style.display = 'table-cell'; // Mostrar coluna de ações
        } else {
            document.body.classList.remove('edit-mode');
            adminElements.forEach(el => el.style.display = 'none');
            publicViewElements.forEach(el => el.style.display = 'inline-block');
            adminPanel.style.display = 'none';
            adminLoginForm.style.display = 'none';
            publicViewContent.style.display = 'block';
            document.querySelector('th:last-child').style.display = 'none'; // Esconder coluna de ações
            hideAddEditForm();
        }
        renderTable(currentData); // Re-renderizar para mostrar/esconder botões de ação
    }

    document.getElementById('adminLoginBtn').addEventListener('click', () => {
        document.getElementById('adminLoginForm').style.display = 'block';
        document.getElementById('publicViewContent').style.display = 'none';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('adminPassword').value = '';
    });

    document.getElementById('loginCancelBtn').addEventListener('click', () => {
        document.getElementById('adminLoginForm').style.display = 'none';
        document.getElementById('publicViewContent').style.display = 'block';
    });

    document.getElementById('loginSubmitBtn').addEventListener('click', () => {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            toggleAdminMode(true);
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    });

    document.getElementById('adminLogoutBtn').addEventListener('click', () => {
        toggleAdminMode(false);
    });

    document.getElementById('addRecordBtn').addEventListener('click', () => {
        editIndex = -1;
        document.getElementById('formTitle').textContent = 'Adicionar';
        document.getElementById('formAno').value = '';
        document.getElementById('formEmpresa').value = '';
        document.getElementById('formFuncao').value = '';
        document.getElementById('formNome').value = '';
        document.getElementById('formLocal').value = '';
        document.getElementById('addEditForm').style.display = 'block';
    });

    document.getElementById('cancelFormBtn').addEventListener('click', hideAddEditForm);

    function hideAddEditForm() {
        document.getElementById('addEditForm').style.display = 'none';
    }

    document.getElementById('saveRecordBtn').addEventListener('click', () => {
        const newRecord = {
            Ano: document.getElementById('formAno').value,
            Empresa: document.getElementById('formEmpresa').value,
            Função: document.getElementById('formFuncao').value,
            Nome: document.getElementById('formNome').value,
            Local: document.getElementById('formLocal').value
        };

        if (editIndex === -1) {
            data.push(newRecord);
        } else {
            data[editIndex] = newRecord;
        }
        filterData(); // Re-filtrar e re-renderizar com os novos dados
        hideAddEditForm();
    });

    function editRecord(index) {
        editIndex = index;
        const record = currentData[index];
        document.getElementById('formTitle').textContent = 'Editar';
        document.getElementById('formAno').value = record.Ano || '';
        document.getElementById('formEmpresa').value = record.Empresa || '';
        document.getElementById('formFuncao').value = record.Função || '';
        document.getElementById('formNome').value = record.Nome || '';
        document.getElementById('formLocal').value = record.Local || '';
        document.getElementById('addEditForm').style.display = 'block';
    }

    function deleteRecord(index) {
        if (confirm('Tem certeza que deseja excluir este registro?')) {
            data.splice(index, 1);
            filterData(); // Re-filtrar e re-renderizar
        }
    }

    document.getElementById('exportHtmlBtn').addEventListener('click', () => {
        const currentHtml = document.documentElement.outerHTML;
        const updatedDataJson = JSON.stringify(data, null, 2);
        
        // Substituir a linha de dados no HTML com os dados atualizados
        const newHtml = currentHtml.replace(/let data = .*;/s, `let data = ${updatedDataJson};`);

        const blob = new Blob([newHtml], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'painel_terceirizados_atualizado.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert('Arquivo HTML atualizado e exportado com sucesso!');
    });

    document.getElementById('searchInput').addEventListener('input', filterData);
    renderTable(data);


    // Função para exportar para PDF
    function exportToPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Título
            doc.setFontSize(16);
            doc.text('Painel de Terceirizados - Prefeitura de Vazante', 14, 15);
            
            // Data
            doc.setFontSize(10);
            doc.text('Data de Exportação: ' + new Date().toLocaleDateString('pt-BR'), 14, 25);
            
            // Tabela
            const tableData = [];
            
            // Cabeçalho
            tableData.push(['Ano', 'Empresa / CNPJ', 'Função', 'Nome', 'Local']);
            
            // Dados - usar currentData que contém os registros filtrados
            currentData.forEach(item => {
                tableData.push([
                    item.Ano || '',
                    item.Empresa || '',
                    item.Função || '',
                    item.Nome || '',
                    item.Local || ''
                ]);
            });
            
            // Adicionar tabela ao PDF
            doc.autoTable({
                head: [tableData[0]],
                body: tableData.slice(1),
                startY: 35,
                margin: 10,
                styles: {
                    fontSize: 9,
                    cellPadding: 3
                },
                headStyles: {
                    fillColor: [0, 74, 153],
                    textColor: 255,
                    fontStyle: 'bold'
                },
                alternateRowStyles: {
                    fillColor: [240, 245, 250]
                }
            });
            
            // Salvar PDF
            doc.save('Painel_Terceirizados_' + new Date().toISOString().split('T')[0] + '.pdf');
            alert('PDF exportado com sucesso!');
        } catch (error) {
            console.error('Erro ao exportar PDF:', error);
            alert('Erro ao exportar PDF. Verifique o console.');
        }
    }
    
    // Função para exportar para Word
    function exportToDoc() {
        try {
            // Verificar se docx está carregado
            if (typeof docx === 'undefined') {
                alert('Biblioteca Word não carregada. Aguarde um momento e tente novamente.');
                return;
            }
            
            // Preparar dados
            if (!currentData || currentData.length === 0) {
                alert('Nenhum dado para exportar!');
                return;
            }
            
            // Criar linhas da tabela
            const rows = [];
            
            // Cabeçalho
            rows.push(
                new docx.TableRow({
                    cells: [
                        new docx.TableCell({ children: [new docx.Paragraph({ text: 'Ano', bold: true })] }),
                        new docx.TableCell({ children: [new docx.Paragraph({ text: 'Empresa / CNPJ', bold: true })] }),
                        new docx.TableCell({ children: [new docx.Paragraph({ text: 'Função', bold: true })] }),
                        new docx.TableCell({ children: [new docx.Paragraph({ text: 'Nome', bold: true })] }),
                        new docx.TableCell({ children: [new docx.Paragraph({ text: 'Local', bold: true })] })
                    ]
                })
            );
            
            // Dados
            currentData.forEach(item => {
                rows.push(
                    new docx.TableRow({
                        cells: [
                            new docx.TableCell({ children: [new docx.Paragraph({ text: String(item.Ano || '') })] }),
                            new docx.TableCell({ children: [new docx.Paragraph({ text: String(item.Empresa || '') })] }),
                            new docx.TableCell({ children: [new docx.Paragraph({ text: String(item.Função || '') })] }),
                            new docx.TableCell({ children: [new docx.Paragraph({ text: String(item.Nome || '') })] }),
                            new docx.TableCell({ children: [new docx.Paragraph({ text: String(item.Local || '') })] })
                        ]
                    })
                );
            });
            
            // Criar documento
            const doc = new docx.Document({
                sections: [{
                    children: [
                        new docx.Paragraph({
                            text: 'Painel de Terceirizados - Prefeitura de Vazante',
                            heading: docx.HeadingLevel.HEADING_1,
                            bold: true,
                            spacing: { after: 200 }
                        }),
                        new docx.Paragraph({
                            text: 'Data de Exportação: ' + new Date().toLocaleDateString('pt-BR'),
                            spacing: { after: 400 }
                        }),
                        new docx.Table({
                            rows: rows,
                            width: { size: 100, type: docx.WidthType.PERCENTAGE }
                        })
                    ]
                }]
            });
            
            // Gerar nome do arquivo com data
            const dataAtual = new Date();
            const nomeArquivo = 'Painel_Terceirizados_' + 
                dataAtual.getFullYear() + '-' +
                String(dataAtual.getMonth() + 1).padStart(2, '0') + '-' +
                String(dataAtual.getDate()).padStart(2, '0') + '.docx';
            
            // Salvar arquivo
            docx.Packer.toBlob(doc).then(blob => {
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = nomeArquivo;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
                alert('Documento Word exportado com sucesso!');
            });
        } catch (error) {
            console.error('Erro ao exportar Word:', error);
            alert('Erro ao exportar Word: ' + error.message);
        }
    }
    
    // Adicionar event listeners aos botões de exportação
    document.addEventListener('DOMContentLoaded', function() {
        const exportPdfBtn = document.getElementById('exportPdfBtn');
        const exportDocBtn = document.getElementById('exportDocBtn');
        
        if (exportPdfBtn) {
            exportPdfBtn.addEventListener('click', exportToPDF);
        }
        
        if (exportDocBtn) {
            exportDocBtn.addEventListener('click', exportToDoc);
        }
    });
